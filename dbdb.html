<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        @import url(https://fonts.googleapis.com/css?family=Roboto:300);

.login-page {
  width: 360px;
  padding: 8% 0 0;
  margin: auto;
}
.form {
  position: relative;
  z-index: 1;
  background: #ffffff;
  max-width: 360px;
  margin: 0 auto 100px;
  padding: 45px;
  text-align: center;
  box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.2), 0 5px 5px 0 rgba(0, 0, 0, 0.24);
}
.form input {
  font-family: "Roboto", sans-serif;
  outline: 0;
  background: #f2f2f2;
  width: 100%;
  border: 0;
  margin: 0 0 15px;
  padding: 15px;
  box-sizing: border-box;
  font-size: 14px;
}
.form button {
  font-family: "Roboto", sans-serif;
  text-transform: uppercase;
  outline: 0;
  background: #af4c4c;
  width: 100%;
  border: 0;
  padding: 15px;
  color: #ffffff;
  font-size: 14px;
  -webkit-transition: all 0.3 ease;
  transition: all 0.3 ease;
  cursor: pointer;
}
.form button:hover,
.form button:active,
.form button:focus {
  background: #a04343;
}
.form .message {
  margin: 15px 0 0;
  color: #b3b3b3;
  font-size: 12px;
}
.form .message a {
  color: #af4c4c;
  text-decoration: none;
}
.form .register-form {
  display: none;
}
.container {
  position: relative;
  z-index: 1;
  max-width: 300px;
  margin: 0 auto;
}
.container:before,
.container:after {
  content: "";
  display: block;
  clear: both;
}
.container .info {
  margin: 50px auto;
  text-align: center;
}
.container .info h1 {
  margin: 0 0 15px;
  padding: 0;
  font-size: 36px;
  font-weight: 300;
  color: #1a1a1a;
}
.container .info span {
  color: #4d4d4d;
  font-size: 12px;
}
.container .info span a {
  color: #000000;
  text-decoration: none;
}
.container .info span .fa {
  color: #ff2c2c;
}
body {
  background: #b85252; /* fallback for old browsers */
  background: -webkit-linear-gradient(right, #b85252, #c26f6f);
  background: -moz-linear-gradient(right, #b85252, #c26f6f);
  background: -o-linear-gradient(right, #b85252, #c26f6f);
  background: linear-gradient(to left, #b85252, #c26f6f);
  font-family: "Roboto", sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Table Start */

table {
  font-family: arial, sans-serif;
  border-collapse: collapse;
  width: 100%;
  margin-bottom: 50px;
}

td,
th {
  border: 1px solid #dddddd;
  text-align: left;
  padding: 8px;
}

tr:nth-child(even) {
  background-color: #dddddd;
}

.text-center {
  text-align: center;
}

/* Table End */

    </style>

    <title>SabzLearn | Js | 298</title>
  </head>

  <body>
    <div class="login-page">
      <div class="form">
        <form class="register-form" style="display: inline-block">
          <input type="text" class="name-input" placeholder="name" />
          <input type="password" class="password-input" placeholder="password" />
          <input type="email" class="email-input" placeholder="email address" />
          <button>create</button>
          <p class="message">
            
          </p>
        </form>
      </div>
    </div>


    <h2 class="text-center">Users List</h2>

    <table>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Password</th>
        <th>Email</th>
      </tr>
    </table>

    <script>
        let $ = document
const registerForm = $.querySelector('.register-form')
const nameInput = $.querySelector('.name-input')
const passwordInput = $.querySelector('.password-input')
const emailInput = $.querySelector('.email-input')
const usersTableElem = $.querySelector('table')

let db = null
let objectStore = null

window.addEventListener('load', () => {

    let DBOpenReq = indexedDB.open('SabzLearn', 18)

    DBOpenReq.addEventListener('error', (err) => {
        console.warn('Error', err);
    })

    DBOpenReq.addEventListener('success', (event) => {
        db = event.target.result
        getUsers()
        console.log('Success', event.target.result);
    })

    DBOpenReq.addEventListener('upgradeneeded', (event) => {

        db = event.target.result

        console.log('Old V:', event.oldVersion);
        console.log('New V:', event.newVersion);

        if (!db.objectStoreNames.contains('users')) {
            objectStore = db.createObjectStore('users', {
                keyPath: 'userID'
            })
        }

        if (db.objectStoreNames.contains('courses')) {
            db.deleteObjectStore('courses')
        }

        // db.createObjectStore('courses')

        console.log('upgrade', db.objectStoreNames);

    })


})


registerForm.addEventListener('submit', event => {
    event.preventDefault()

    let newUser = {
        userID: Math.floor(Math.random() * 9999),
        name: nameInput.value,
        password: passwordInput.value,
        email: emailInput.value,
    }

    let tx = createTX('users', 'readwrite')

    tx.addEventListener('complete', (event) => {
        console.log('Tx', event)
    })

    let store = tx.objectStore('users')
    let request = store.add(newUser)

    request.addEventListener('error', (err) => {
        console.warn('Request Error:', err)
    })

    request.addEventListener('success', (event) => {

        console.log('Request', event)
        clearInputs()
        getUsers()
    })



})

function clearInputs() {
    nameInput.value = ''
    passwordInput.value = ''
    emailInput.value = ''
}

function getUsers() {

    let tx = createTX('users', 'readonly')

    tx.addEventListener('complete', (event) => {
        console.log('Tx', event)
    })

    let store = tx.objectStore('users')
    let request = store.getAll()

    request.addEventListener('error', (err) => {
        console.warn('Get Request Error:', err)
    })

    request.addEventListener('success', (event) => {

        let allUsers = event.target.result

        usersTableElem.innerHTML = `<tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Password</th>
                                        <th>Email</th>
                                    </tr>`

        usersTableElem.innerHTML += allUsers.map(user => {
            return `<tr>
                        <td>${user.userID}</td>
                        <td>${user.name}</td>
                        <td>${user.password}</td>
                        <td>${user.email}</td>
                    </tr>`
        }).join('')

        // console.log(usersTemplateArray);

    })

}

function createTX (storeName, mode) {
    let tx = db.transaction(storeName, mode)

    tx.addEventListener('error', (err) => {
        console.warn('Tx Error:', err)
    })

    return tx
}

// DRY => Don't Repeat Yourself
    </script>
  </body>
</html>
